<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg?v=2" />
    <link rel="shortcut icon" href="/logo.svg?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HyruleDex — Enciclopedia de Zelda</title>
    <script>
      // Prevent flash of wrong theme on initial load
      (function() {
        try {
          const store = JSON.parse(localStorage.getItem('hyruledex-store') || '{}');
          const theme = store.state?.theme || 'dark';
          if (theme === 'light') {
            document.documentElement.classList.add('light');
          }
        } catch(e) {
          // Default to dark theme
        }
      })();
    </script>
    <!-- SEO Meta Tags -->
    <meta name="description" content="Enciclopedia completa del universo Zelda: personajes, jefes, objetos, criaturas, mapas, línea temporal e historia de Hyrule.">
    <!-- Open Graph -->
    <meta property="og:title" content="HyruleDex — Enciclopedia de Zelda">
    <meta property="og:description" content="Explora el universo completo de The Legend of Zelda con HyruleDex. Personajes, jefes, objetos, criaturas, mapas interactivos y línea temporal.">
    <meta property="og:image" content="https://hyruledex.vercel.app/og-image.png">
    <meta property="og:url" content="https://hyruledex.vercel.app/">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="es_ES">
    <meta property="og:site_name" content="HyruleDex">
    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="HyruleDex — Enciclopedia de Zelda">
    <meta name="twitter:description" content="Explora el universo completo de The Legend of Zelda. Enciclopedia interactiva de Hyrule.">
    <meta name="twitter:image" content="https://hyruledex.vercel.app/og-image.png">
    <meta name="twitter:site" content="@hyruledex">
    <!-- SEO -->
    <link rel="canonical" href="https://hyruledex.vercel.app/">
    <meta name="keywords" content="Zelda,Hyrule,enciclopedia,personajes Zelda,jefes Zelda,objetos Zelda,Breath of the Wild,Tears of the Kingdom,Ocarina of Time">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1">
    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {"@context":"https://schema.org","@type":"WebSite","name":"HyruleDex","url":"https://hyruledex.vercel.app","description":"Enciclopedia completa del universo Zelda","inLanguage":"es","potentialAction":{"@type":"SearchAction","target":"https://hyruledex.vercel.app/?search={search_term_string}","query-input":"required name=search_term_string"}}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
